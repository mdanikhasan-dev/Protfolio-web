story_heading: Who is MD Anik Hasan?

body_1: The one that got me into computers was games. When I was 7 years old I started with GTA Bangla Vice City (a modded version). Back then playing games was so much fun. It didn't mean anything deeper than that.
body_2: After a while I began to notice the weird moments within games. Bugs where infinite money was given to you, environments which glitched out, textures which stopped rendering properly. I was interested in seeing those moments. I thought, so this is what the game would look like when something goes wrong. What would it look like when the developers are making it?
body_3: I even attempted to tamper with game files on my own. I opened folders, found text files, and tried editing them, assuming that perhaps I would be able to rewrite something in the game. Of course it didn't work. Yeah, because I had no idea what I was doing. But I was stubborn and I made up my mind that I would change something in the game.
body_4: Then I started searching online, watching videos, and reading things to understand how games actually work. That curiosity is one of the reasons I decided to study Computer Science and Engineering.
body_5: Now I am learning the fundamentals of programming, web development, and game development. I want that foundation to grow into long term work in games and interactive experiences.
body_6: I am still learning and still experimenting. This website is where I document that growth.
