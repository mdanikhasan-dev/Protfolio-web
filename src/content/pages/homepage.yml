hero_title: MD Anik Hasan Portfolio
hero_body: This portfolio brings together my work, learning process, and long term growth in programming and game development. I study Computer Science and Engineering at UIU, but most of my curiosity started long before university through games, computers, and spending too much time trying to understand how things work. Right now I am focused on learning coding fundamentals, improving my logic, and building the skills I will need for game development later on.
