<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>SAWLPER Editor</title>
  <script>window.CMS_MANUAL_INIT = true;</script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <style>
    html, body { margin: 0; min-height: 100%; background: #09090b; }
    body { font-family: Inter, system-ui, sans-serif; }
    #loader {
      position: fixed; inset: 0; display: grid; place-items: center;
      background: radial-gradient(circle at top, rgba(124,58,237,.15), transparent 26%), #09090b;
      color: #f4f4f5; letter-spacing: .08em; text-transform: uppercase; font: 700 12px Inter, system-ui, sans-serif;
    }
    .netlify-identity-widget { z-index: 999999 !important; }
  </style>
</head>
<body>
  <div id="loader">Loading editor…</div>
  <script>
    (function () {
      function redirectOut() {
        window.top.location.href = '/sawlper/';
      }
      if (!window.netlifyIdentity) {
        document.getElementById('loader').textContent = 'Identity failed to load';
        return;
      }
      function start() {
        if (window.CMS_STARTED) return;
        window.CMS_STARTED = true;
        document.getElementById('loader').style.display = 'none';
        window.CMS.init();
      }
      window.netlifyIdentity.on('init', function (user) { if (user) start(); else redirectOut(); });
      window.netlifyIdentity.on('login', start);
      window.netlifyIdentity.on('logout', redirectOut);
      window.netlifyIdentity.init();
    })();
  </script>
</body>
</html>
