backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

site_url: "https://mdanikhasan.com"
display_url: "https://mdanikhasan.com"
logo_url: "/assets/icons/icon-192.png"

publish_mode: "simple"

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: "posts"
    label: "Blog Posts"
    label_singular: "Post"
    folder: "src/content/posts"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}}"
    sortable_fields: ["date", "title"]
    view_groups:
      - label: "Draft"
        field: "draft"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Cover", name: "cover", widget: "image", required: false, allow_multiple: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "src/content/projects"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}}"
    sortable_fields: ["title", "featured"]
    view_groups:
      - label: "Featured"
        field: "featured"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false, allow_multiple: false }
      - { label: "Tech Stack", name: "stack", widget: "list", required: false, collapsed: false }
      - { label: "Live URL", name: "live_url", widget: "string", required: false }
      - { label: "GitHub URL", name: "github_url", widget: "string", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, required: false }
      - { label: "Body", name: "body", widget: "markdown", required: false }

  - name: "pages"
    label: "Pages"
    files:
      - label: "Homepage"
        name: "homepage"
        file: "src/content/pages/homepage.yml"
        fields:
          - { label: "Hero Title", name: "hero_title", widget: "string", required: false }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "text", required: false }
          - { label: "Hero Image", name: "hero_image", widget: "image", required: false }

      - label: "About Page"
        name: "about"
        file: "src/content/pages/about.yml"
        fields:
          - { label: "Title", name: "title", widget: "string", required: false }
          - { label: "Intro", name: "intro", widget: "text", required: false }
          - { label: "Body", name: "body", widget: "markdown", required: false }

      - label: "Contact Page"
        name: "contact"
        file: "src/content/pages/contact.yml"
        fields:
          - { label: "Title", name: "title", widget: "string", required: false }
          - { label: "Email", name: "email", widget: "string", required: false }
          - { label: "Phone", name: "phone", widget: "string", required: false }
          - { label: "Location", name: "location", widget: "string", required: false }

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General Settings"
        name: "general"
        file: "src/content/settings/general.yml"
        fields:
          - { label: "Site Title", name: "site_title", widget: "string", required: false }
          - { label: "Site Description", name: "site_description", widget: "text", required: false }
          - { label: "Canonical URL", name: "site_url", widget: "string", required: false }
          - { label: "Logo", name: "logo", widget: "image", required: false }

      - label: "Social Links"
        name: "social"
        file: "src/content/settings/social.yml"
        fields:
          - { label: "Facebook", name: "facebook", widget: "string", required: false }
          - { label: "Instagram", name: "instagram", widget: "string", required: false }
          - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
          - { label: "GitHub", name: "github", widget: "string", required: false }
          - { label: "YouTube", name: "youtube", widget: "string", required: false }
