backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

site_url: "https://mdanikhasan.com"
display_url: "https://mdanikhasan.com"
logo_url: "/assets/icons/icon-192.png"
publish_mode: simple
locale: "en"

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

editor:
  preview: false

collections:
  - name: "posts"
    label: "Blog"
    label_singular: "Post"
    folder: "src/content/posts"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "Use lowercase words with hyphens." }
      - { label: "Publish Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: "Short Description", name: "description", widget: "text", hint: "Shows on the blog list." }
      - { label: "Cover Image", name: "cover", widget: "image", required: false, allow_multiple: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "Article", name: "body", widget: "markdown" }

  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "src/content/projects"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}}"
    fields:
      - { label: "Project Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "Use lowercase words with hyphens." }
      - { label: "Description", name: "description", widget: "text", hint: "Short summary for the project card." }
      - { label: "Tools Used", name: "tools", widget: "list", hint: "One tool per line." }
      - { label: "Source Code", name: "source_code", widget: "string", required: false }
      - { label: "Live Demo", name: "live_demo", widget: "string", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, required: false }

  - name: "site_settings"
    label: "Site Settings"
    files:
      - label: "General"
        name: "general"
        file: "src/content/settings/general.yml"
        fields:
          - { label: "Site Title", name: "site_title", widget: "string" }
          - { label: "Site Description", name: "site_description", widget: "text" }
          - { label: "Site URL", name: "site_url", widget: "string" }
          - { label: "Logo", name: "logo", widget: "image", required: false }

      - label: "SEO"
        name: "seo"
        file: "src/content/settings/seo.yml"
        fields:
          - { label: "Meta Title", name: "meta_title", widget: "string" }
          - { label: "Meta Description", name: "meta_description", widget: "text" }
          - { label: "Open Graph Image", name: "og_image", widget: "image", required: false }

      - label: "Social Links"
        name: "social"
        file: "src/content/settings/social.yml"
        fields:
          - { label: "GitHub", name: "github", widget: "string", required: false }
          - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
          - { label: "Facebook", name: "facebook", widget: "string", required: false }
          - { label: "Instagram", name: "instagram", widget: "string", required: false }
          - { label: "YouTube", name: "youtube", widget: "string", required: false }
          - { label: "X", name: "x", widget: "string", required: false }
          - { label: "Discord", name: "discord", widget: "string", required: false }

      - label: "Contact Info"
        name: "contact"
        file: "src/content/settings/contact.yml"
        fields:
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Response Time", name: "response_time", widget: "string", required: false }
          - { label: "Location", name: "location", widget: "string", required: false }

      - label: "Analytics"
        name: "analytics"
        file: "src/content/settings/analytics.yml"
        fields:
          - label: "Provider"
            name: "provider"
            widget: "select"
            required: false
            options:
              - { label: "Disabled", value: "" }
              - { label: "Plausible", value: "plausible" }
              - { label: "GoatCounter", value: "goatcounter" }
          - { label: "Domain or Endpoint", name: "domain", widget: "string", required: false, hint: "Plausible: your domain. GoatCounter: your hosted endpoint or subdomain." }
          - { label: "Custom Script Source", name: "script_src", widget: "string", required: false, hint: "Optional override for the provider script URL." }
