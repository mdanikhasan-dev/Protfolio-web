<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>SAWLPER CMS</title>

  <script>
    window.CMS_MANUAL_INIT = true;
  </script>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(214,171,92,.08), transparent 32%),
        linear-gradient(180deg, #04110f 0%, #031816 100%);
      color: #f4f5ef;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .gate {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center, rgba(214,171,92,.06), transparent 32%),
        linear-gradient(180deg, rgba(3,16,14,.8), rgba(2,19,17,.9));
    }

    .gate.hidden {
      display: none;
    }

    .card {
      width: 100%;
      max-width: 520px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(7,20,18,.9);
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
      overflow: hidden;
    }

    .top {
      padding: 30px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .title {
      margin: 0;
      font-size: 48px;
      font-weight: 900;
    }

    .subtitle {
      margin: 6px 0 0;
      font-size: 14px;
      letter-spacing: .2em;
      text-transform: uppercase;
      opacity: .7;
    }

    .body {
      padding: 24px 30px 30px;
    }

    .status {
      margin-bottom: 16px;
      font-size: 14px;
    }

    .status.error { color: #ff8d78; }
    .status.success { color: #9be29b; }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .primary {
      background: #d8ae63;
      color: #111;
    }

    .secondary {
      background: rgba(255,255,255,.06);
      color: #fff;
      border: 1px solid rgba(255,255,255,.08);
    }

    .link {
      background: transparent;
      color: rgba(255,255,255,.7);
    }

    .netlify-identity-widget {
      z-index: 10000 !important;
    }
  </style>
</head>

<body>

  <div class="gate" id="gate">
    <div class="card">
      <div class="top">
        <h1 class="title">SAWLPER</h1>
        <p class="subtitle">Content Studio</p>
      </div>

      <div class="body">
        <div class="status" id="status">Ready.</div>

        <div class="actions">
          <button class="btn primary" id="loginBtn">Sign in</button>
          <button class="btn secondary" id="refreshBtn">Refresh</button>
          <button class="btn link" id="forgotBtn">Forgot password</button>
        </div>
      </div>
    </div>
  </div>

  <script>
  (function () {
    const gate = document.getElementById("gate");
    const statusEl = document.getElementById("status");

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = "status" + (type ? " " + type : "");
    }

    function startCMS() {
      if (!window.CMS_STARTED) {
        window.CMS_STARTED = true;
        window.CMS.init();
        gate.classList.add("hidden");
      }
    }

    document.getElementById("loginBtn").onclick = function () {
      setStatus("Opening login...");
      window.netlifyIdentity.open();
    };

    document.getElementById("forgotBtn").onclick = function () {
      setStatus("Opening recovery...");
      window.netlifyIdentity.open("recover");
    };

    document.getElementById("refreshBtn").onclick = function () {
      location.reload();
    };

    if (!window.netlifyIdentity) {
      setStatus("Identity failed to load", "error");
      return;
    }

    window.netlifyIdentity.on("init", function (user) {
      if (user) {
        setStatus("Loading dashboard...", "success");
        startCMS();
      } else {
        setStatus("Ready.");
      }
    });

    window.netlifyIdentity.on("login", function () {
      setStatus("Loading dashboard...", "success");
      startCMS();
    });

    window.netlifyIdentity.on("logout", function () {
      location.reload();
    });

    window.netlifyIdentity.on("error", function (err) {
      setStatus(err.message || "Auth error", "error");
    });

    window.netlifyIdentity.init();
  })();
  </script>

</body>
</html>
