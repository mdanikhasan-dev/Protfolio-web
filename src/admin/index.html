<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#07100d">
  <title>SAWLPER</title>

  <script>window.CMS_MANUAL_INIT = true;</script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <style>
    :root {
      --bg: #07100d;
      --bg-2: #0a1712;
      --text: #eef5f1;
      --muted: #8ea39a;
      --line: rgba(255,255,255,.14);
      --button: rgba(255,255,255,.06);
      --button-hover: rgba(255,255,255,.1);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(24, 80, 57, .18), transparent 30%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body.admin-live {
      background: #fff;
      color: #111;
    }

    .gate,
    .loader {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      z-index: 20;
      background:
        radial-gradient(circle at top, rgba(24, 80, 57, .18), transparent 30%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
    }

    .gate[hidden],
    .loader[hidden] {
      display: none;
    }

    .gate__inner {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .gate__brand {
      margin: 0;
      font-size: clamp(38px, 8vw, 64px);
      line-height: 1;
      letter-spacing: -.04em;
      font-weight: 800;
    }

    .gate__sub {
      margin: 14px 0 28px;
      color: var(--muted);
      font-size: 15px;
    }

    .gate__enter {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--button);
      color: var(--text);
      border-radius: 999px;
      padding: 14px 24px;
      min-width: 170px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s ease, border-color .18s ease, transform .18s ease;
    }

    .gate__enter:hover {
      background: var(--button-hover);
      border-color: rgba(255,255,255,.2);
      transform: translateY(-1px);
    }

    .gate__status {
      margin: 18px 0 0;
      min-height: 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .loader__text {
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="gate" id="gate">
    <div class="gate__inner">
      <h1 class="gate__brand">SAWLPER</h1>
      <p class="gate__sub">Enter portal</p>
      <button class="gate__enter" id="enterPortal" type="button">Enter portal</button>
      <p class="gate__status" id="gateStatus"></p>
    </div>
  </div>

  <div class="loader" id="loader" hidden>
    <div class="loader__text" id="loaderText">Loading editor</div>
  </div>

  <script>
    (function () {
      var gate = document.getElementById("gate");
      var loader = document.getElementById("loader");
      var loaderText = document.getElementById("loaderText");
      var gateStatus = document.getElementById("gateStatus");
      var enterPortal = document.getElementById("enterPortal");
      var started = false;

      function showGate(message) {
        gate.hidden = false;
        loader.hidden = true;
        gateStatus.textContent = message || "";
        document.body.classList.remove("admin-live");
      }

      function showLoader(message) {
        gate.hidden = true;
        loader.hidden = false;
        loaderText.textContent = message || "Loading editor";
      }

      function startCMS() {
        if (started) return;
        started = true;
        document.body.classList.add("admin-live");
        showLoader("Loading editor");

        try {
          window.CMS.init();
          setTimeout(function () {
            loader.hidden = true;
          }, 600);
        } catch (error) {
          started = false;
          showGate("Editor failed to start.");
          console.error(error);
        }
      }

      if (!window.netlifyIdentity || !window.CMS) {
        showGate("Admin dependencies failed to load.");
        return;
      }

      enterPortal.addEventListener("click", function () {
        window.netlifyIdentity.open("login");
      });

      window.netlifyIdentity.on("init", function (user) {
        if (user) {
          startCMS();
        } else {
          showGate("");
        }
      });

      window.netlifyIdentity.on("login", function () {
        window.netlifyIdentity.close();
        startCMS();
      });

      window.netlifyIdentity.on("logout", function () {
        started = false;
        window.location.replace("/sawlper/");
      });

      window.netlifyIdentity.init();
    })();
  </script>
</body>
</html>
