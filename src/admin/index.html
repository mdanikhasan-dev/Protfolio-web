<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>SAWLPER</title>
  <link rel="icon" href="/assets/icons/favicon.png" type="image/png" />
  <style>
    :root {
      color-scheme: dark;
      --bg-1: #041110;
      --bg-2: #071917;
      --panel: rgba(9, 22, 20, 0.86);
      --line: rgba(255, 255, 255, 0.08);
      --line-strong: rgba(214, 170, 96, 0.34);
      --text: #f4f7f5;
      --muted: #97a7a0;
      --gold: #d6aa60;
      --gold-strong: #e6bf7d;
      --danger: #ff8f7a;
      --success: #b6d9bf;
      --shadow: 0 30px 90px rgba(0, 0, 0, 0.42);
    }
    * { box-sizing: border-box; }
    html, body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 14% 18%, rgba(214, 170, 96, 0.08), transparent 24%),
        radial-gradient(circle at 85% 16%, rgba(77, 129, 114, 0.1), transparent 26%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body { overflow: hidden; }
    body.cms-live {
      overflow: auto;
      background:
        radial-gradient(circle at top, rgba(214, 170, 96, 0.05), transparent 24%),
        linear-gradient(180deg, #06110f 0%, #081614 100%);
    }
    #gate {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      z-index: 9999;
      transition: opacity 0.22s ease, visibility 0.22s ease;
    }
    #gate.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    #gate .shell {
      width: min(92vw, 520px);
      border-radius: 28px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)),
        var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      overflow: hidden;
      position: relative;
      isolation: isolate;
    }
    #gate .shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 15%, rgba(214, 170, 96, 0.12), transparent 24%),
        radial-gradient(circle at 88% 78%, rgba(84, 132, 118, 0.12), transparent 30%);
      pointer-events: none;
      z-index: -1;
    }
    #gate .head {
      padding: 34px 34px 22px;
      border-bottom: 1px solid var(--line);
    }
    #gate .brand {
      margin: 0;
      font-size: clamp(42px, 7vw, 58px);
      line-height: 0.92;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    #gate .label {
      margin-top: 10px;
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }
    #gate .body {
      padding: 28px 34px 32px;
      display: grid;
      gap: 18px;
    }
    #gate .status {
      min-height: 22px;
      font-size: 14px;
      color: var(--muted);
    }
    #gate .status.is-error { color: var(--danger); }
    #gate .status.is-success { color: var(--success); }
    #gate form { display: grid; gap: 14px; }
    #gate .field { display: grid; gap: 8px; }
    #gate .field label {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    #gate .input-wrap input {
      width: 100%;
      height: 56px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      padding: 0 16px;
      font: inherit;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }
    #gate .input-wrap input:focus {
      border-color: var(--line-strong);
      box-shadow: 0 0 0 4px rgba(214, 170, 96, 0.1);
      background: rgba(255, 255, 255, 0.05);
    }
    #gate .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    #gate button {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 15px 22px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease;
    }
    #gate button:hover { transform: translateY(-1px); }
    #gate button:disabled {
      opacity: 0.7;
      cursor: wait;
      transform: none;
    }
    #gate .primary {
      min-width: 148px;
      background: linear-gradient(180deg, var(--gold-strong), var(--gold));
      color: #1b1205;
      box-shadow: 0 10px 24px rgba(214, 170, 96, 0.2);
    }
    #gate .secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border: 1px solid var(--line);
    }
    #gate .text-btn {
      background: transparent;
      color: var(--muted);
      padding: 0;
      border-radius: 0;
    }
    #gate .mode-note,
    #gate .helper {
      font-size: 13px;
      color: var(--muted);
    }
    #gate .mode-note { display: none; }
    #gate .mode-note.is-visible { display: block; }

    body.cms-live #nc-root,
    body.cms-live #nc-root * {
      box-sizing: border-box;
    }
    body.cms-live #nc-root {
      color: #eef3f1;
    }
    body.cms-live #nc-root a {
      color: #ddb56d;
    }
    body.cms-live #nc-root button,
    body.cms-live #nc-root [role="button"],
    body.cms-live #nc-root .btn,
    body.cms-live #nc-root input,
    body.cms-live #nc-root textarea,
    body.cms-live #nc-root select {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    }
    body.cms-live #nc-root button,
    body.cms-live #nc-root [role="button"],
    body.cms-live #nc-root .btn {
      border-radius: 14px !important;
      box-shadow: none !important;
    }
    body.cms-live #nc-root input,
    body.cms-live #nc-root textarea,
    body.cms-live #nc-root select {
      border-radius: 14px !important;
      background: #0d1514 !important;
      color: #f4f7f5 !important;
      border: 1px solid rgba(255,255,255,.10) !important;
      box-shadow: none !important;
    }
    body.cms-live #nc-root label,
    body.cms-live #nc-root small,
    body.cms-live #nc-root p,
    body.cms-live #nc-root span,
    body.cms-live #nc-root h1,
    body.cms-live #nc-root h2,
    body.cms-live #nc-root h3,
    body.cms-live #nc-root h4,
    body.cms-live #nc-root h5,
    body.cms-live #nc-root h6 {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    }
    body.cms-live #nc-root > div,
    body.cms-live #nc-root main,
    body.cms-live #nc-root section,
    body.cms-live #nc-root article,
    body.cms-live #nc-root aside,
    body.cms-live #nc-root nav,
    body.cms-live #nc-root header {
      background-color: transparent;
    }
    body.cms-live #nc-root aside,
    body.cms-live #nc-root nav[aria-label],
    body.cms-live #nc-root [class*="Sidebar"] {
      background: rgba(6, 17, 16, 0.9) !important;
      border-right: 1px solid rgba(255,255,255,.08) !important;
      backdrop-filter: blur(10px);
    }
    body.cms-live #nc-root header,
    body.cms-live #nc-root [class*="TopBar"],
    body.cms-live #nc-root [class*="Toolbar"] {
      background: rgba(9, 18, 17, 0.94) !important;
      border-bottom: 1px solid rgba(255,255,255,.08) !important;
      backdrop-filter: blur(10px);
    }
    body.cms-live #nc-root main,
    body.cms-live #nc-root [class*="CollectionTop"],
    body.cms-live #nc-root [class*="EditorContainer"],
    body.cms-live #nc-root [class*="EditorPane"],
    body.cms-live #nc-root [class*="ListCard"],
    body.cms-live #nc-root [class*="Card"] {
      background: transparent !important;
    }
    body.cms-live #nc-root [class*="ListCard"],
    body.cms-live #nc-root [class*="Card"],
    body.cms-live #nc-root article,
    body.cms-live #nc-root [class*="Entry"],
    body.cms-live #nc-root [class*="Frame"] {
      border-radius: 18px !important;
    }
    body.cms-live #nc-root ul,
    body.cms-live #nc-root ol {
      padding-left: 1.2rem;
    }
    body.cms-live #nc-root [data-slate-editor="true"] {
      min-height: 280px;
      border-radius: 16px !important;
      background: #0d1514 !important;
      color: #f4f7f5 !important;
      border: 1px solid rgba(255,255,255,.10) !important;
      padding: 16px !important;
    }
    body.cms-live #nc-root [href*="#signup"],
    body.cms-live .netlify-identity-widget a[href="#signup"],
    body.cms-live .netlify-identity-widget button[data-netlify-identity-button="signup"],
    body.cms-live .netlify-identity-widget .tab.signup,
    body.cms-live .netlify-identity-widget .signup,
    body.cms-live .netlify-identity-widget [href*="signup"] {
      display: none !important;
    }
    .netlify-identity-widget .modal { backdrop-filter: blur(8px); }
    .netlify-identity-widget .content {
      border-radius: 24px !important;
      overflow: hidden !important;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.42) !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
    }
    .netlify-identity-widget .btn {
      border-radius: 14px !important;
      font-weight: 700 !important;
    }
    @media (max-width: 600px) {
      #gate .head { padding: 28px 24px 18px; }
      #gate .body { padding: 22px 24px 26px; }
      #gate .brand { font-size: 40px; }
      #gate .row { flex-direction: column; align-items: stretch; }
      #gate .primary, #gate .secondary { width: 100%; }
    }
  </style>
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</head>
<body>
  <div id="gate">
    <section class="shell" aria-label="Admin sign in">
      <div class="head">
        <h1 class="brand">SAWLPER</h1>
        <div class="label">Content Studio</div>
      </div>
      <div class="body">
        <div class="status" id="status">Enter your email and password to continue.</div>
        <form id="auth-form" autocomplete="on">
          <div class="field">
            <label for="email">Email</label>
            <div class="input-wrap">
              <input id="email" name="email" type="email" inputmode="email" autocomplete="email" required />
            </div>
          </div>
          <div class="field" id="password-field">
            <label for="password">Password</label>
            <div class="input-wrap">
              <input id="password" name="password" type="password" autocomplete="current-password" required />
            </div>
          </div>
          <div class="mode-note" id="mode-note">Password recovery sends a reset link to your email.</div>
          <div class="row">
            <button class="primary" id="submit-btn" type="submit">Sign in</button>
            <button class="secondary" id="refresh-btn" type="button">Refresh</button>
            <button class="text-btn" id="forgot-btn" type="button">Forgot password</button>
          </div>
        </form>
      </div>
    </section>
  </div>

  <script>
    const gate = document.getElementById("gate");
    const form = document.getElementById("auth-form");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const passwordField = document.getElementById("password-field");
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submit-btn");
    const refreshBtn = document.getElementById("refresh-btn");
    const forgotBtn = document.getElementById("forgot-btn");
    const modeNote = document.getElementById("mode-note");

    let isRecoverMode = false;
    let cmsStarted = false;

    const setStatus = (message, type) => {
      statusEl.textContent = message;
      statusEl.className = "status" + (type ? " is-" + type : "");
    };

    const setLoading = (loading) => {
      submitBtn.disabled = loading;
      refreshBtn.disabled = loading;
      forgotBtn.disabled = loading;
    };

    const setRecoverMode = (recover) => {
      isRecoverMode = recover;
      passwordField.style.display = recover ? "none" : "grid";
      passwordInput.required = !recover;
      submitBtn.textContent = recover ? "Send reset link" : "Sign in";
      forgotBtn.textContent = recover ? "Back to sign in" : "Forgot password";
      modeNote.classList.toggle("is-visible", recover);
      setStatus(recover ? "Enter your email to get a reset link." : "Enter your email and password to continue.");
    };

    const hideGate = () => {
      document.body.classList.add("cms-live");
      gate.classList.add("is-hidden");
    };

    const startCMS = () => {
      if (cmsStarted || !window.CMS) return;
      cmsStarted = true;
      window.CMS.init();
      hideGate();
    };

    const handleLogin = async (event) => {
      event.preventDefault();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if (!email) {
        setStatus("Enter your email address.", "error");
        emailInput.focus();
        return;
      }
      if (!isRecoverMode && !password) {
        setStatus("Enter your password.", "error");
        passwordInput.focus();
        return;
      }
      if (!window.netlifyIdentity) {
        setStatus("Identity service is unavailable right now.", "error");
        return;
      }
      setLoading(true);
      try {
        if (isRecoverMode) {
          await window.netlifyIdentity.requestPasswordRecovery(email);
          setStatus("Reset link sent. Check your email.", "success");
          setLoading(false);
          return;
        }
        await window.netlifyIdentity.login(email, password, true);
      } catch (error) {
        setStatus((error && error.message) || "Sign in failed.", "error");
      }
      setLoading(false);
    };

    form.addEventListener("submit", handleLogin);
    refreshBtn.addEventListener("click", () => window.location.reload());
    forgotBtn.addEventListener("click", () => setRecoverMode(!isRecoverMode));

    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("login", () => {
        setStatus("Opening editor…", "success");
        startCMS();
      });
      window.netlifyIdentity.on("init", (user) => {
        if (user) {
          startCMS();
        } else {
          setRecoverMode(false);
        }
      });
      window.netlifyIdentity.on("error", (error) => {
        setStatus((error && error.message) || "Authentication error.", "error");
        setLoading(false);
      });
      window.netlifyIdentity.on("logout", () => window.location.reload());
      window.netlifyIdentity.init();
    } else {
      setStatus("Identity service failed to load.", "error");
    }

    window.addEventListener("hashchange", () => {
      if (window.location.hash.includes("recovery_token")) {
        setStatus("Continue in the email reset flow to set a new password.", "success");
      }
      if (window.location.hash.includes("invite_token")) {
        setStatus("Finish the invite flow from your email, then sign in here.", "success");
      }
    });
  </script>
</body>
</html>
