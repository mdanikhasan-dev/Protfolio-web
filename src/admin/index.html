<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>SAWLPER CMS</title>
  <link rel="icon" href="/assets/icons/favicon.png" type="image/png">
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(214, 171, 92, 0.08), transparent 30%),
        linear-gradient(180deg, #04110f 0%, #031816 100%);
      color: #f4f5ef;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      position: relative;
      overflow-x: hidden;
    }

    .auth-shell {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at center, rgba(214, 171, 92, 0.06), transparent 32%),
        linear-gradient(180deg, rgba(3, 16, 14, 0.78), rgba(2, 19, 17, 0.9));
      backdrop-filter: blur(8px);
    }

    .auth-shell.hidden {
      display: none;
    }

    .auth-card {
      width: 100%;
      max-width: 560px;
      border-radius: 30px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(90deg, rgba(255,255,255,0.03), rgba(255,255,255,0.07), rgba(255,255,255,0.02)),
        rgba(7, 20, 18, 0.88);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.38);
    }

    .auth-top {
      padding: 34px 34px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .auth-title {
      margin: 0;
      font-size: 64px;
      line-height: 0.95;
      letter-spacing: 0.02em;
      font-weight: 900;
      color: #f5f5ef;
    }

    .auth-subtitle {
      margin: 10px 0 0;
      font-size: 23px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(245, 245, 239, 0.72);
    }

    .auth-body {
      padding: 28px 34px 34px;
    }

    .auth-status {
      min-height: 28px;
      margin: 0 0 22px;
      font-size: 18px;
      color: #f0f1ea;
    }

    .auth-status.error {
      color: #ff8d78;
    }

    .auth-status.success {
      color: #b8e6b1;
    }

    .auth-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 18px;
      padding: 17px 28px;
      font: inherit;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      min-width: 160px;
      background: #d8ae63;
      color: #111713;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: #eff1ea;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .btn-link {
      background: transparent;
      color: rgba(244, 245, 239, 0.78);
      padding-left: 0;
      padding-right: 0;
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .netlify-identity-widget {
      z-index: 10000 !important;
    }

    @media (max-width: 640px) {
      .auth-card {
        border-radius: 24px;
      }

      .auth-top {
        padding: 26px 22px 16px;
      }

      .auth-title {
        font-size: 44px;
      }

      .auth-subtitle {
        font-size: 16px;
      }

      .auth-body {
        padding: 22px 22px 26px;
      }

      .auth-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .btn,
      .btn-primary,
      .btn-secondary {
        width: 100%;
      }

      .btn-link {
        width: auto;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="auth-shell" id="authShell">
    <div class="auth-card">
      <div class="auth-top">
        <h1 class="auth-title">SAWLPER</h1>
        <p class="auth-subtitle">Content Studio</p>
      </div>
      <div class="auth-body">
        <div class="auth-status" id="authStatus">Ready.</div>
        <div class="auth-actions">
          <button class="btn btn-primary" id="loginBtn" type="button">Sign in</button>
          <button class="btn btn-secondary" id="refreshBtn" type="button">Refresh</button>
          <button class="btn btn-link" id="forgotBtn" type="button">Forgot password</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const authShell = document.getElementById("authShell");
      const authStatus = document.getElementById("authStatus");
      const loginBtn = document.getElementById("loginBtn");
      const refreshBtn = document.getElementById("refreshBtn");
      const forgotBtn = document.getElementById("forgotBtn");

      function setStatus(message, type) {
        authStatus.textContent = message;
        authStatus.className = "auth-status" + (type ? " " + type : "");
      }

      function showCMS() {
        if (window.CMS && typeof window.CMS.init === "function") {
          window.CMS.init();
        }
        authShell.classList.add("hidden");
      }

      function openLogin() {
        if (!window.netlifyIdentity) {
          setStatus("Login service unavailable.", "error");
          return;
        }
        setStatus("Opening sign in…");
        window.netlifyIdentity.open("login");
      }

      function openRecover() {
        if (!window.netlifyIdentity) {
          setStatus("Recovery service unavailable.", "error");
          return;
        }
        setStatus("Opening password recovery…");
        window.netlifyIdentity.open("recover");
      }

      function refreshState() {
        window.location.reload();
      }

      loginBtn.addEventListener("click", openLogin);
      forgotBtn.addEventListener("click", openRecover);
      refreshBtn.addEventListener("click", refreshState);

      if (!window.netlifyIdentity) {
        setStatus("Netlify Identity failed to load.", "error");
        return;
      }

      window.netlifyIdentity.on("init", function (user) {
        const hash = window.location.hash || "";
        const search = window.location.search || "";

        if (hash.includes("invite_token") || search.includes("invite_token")) {
          setStatus("Complete your invited account setup.");
          window.netlifyIdentity.open("signup");
          return;
        }

        if (hash.includes("recovery_token") || search.includes("recovery_token")) {
          setStatus("Reset your password.");
          window.netlifyIdentity.open("recover");
          return;
        }

        if (user) {
          setStatus("Opening dashboard…", "success");
          showCMS();
        } else {
          setStatus("Ready.");
        }
      });

      window.netlifyIdentity.on("login", function () {
        setStatus("Opening dashboard…", "success");
        window.location.href = "/sawlper/";
      });

      window.netlifyIdentity.on("logout", function () {
        window.location.href = "/sawlper/";
      });

      window.netlifyIdentity.on("error", function (err) {
        const message = err && err.message ? err.message : "Authentication failed.";
        setStatus(message, "error");
      });

      window.netlifyIdentity.init();
    })();
  </script>
</body>
</html>
