<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>SAWLPER CMS</title>
  <link rel="icon" href="/assets/icons/favicon.png" type="image/png">
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(214,171,92,.08), transparent 32%),
        linear-gradient(180deg, #04110f 0%, #031816 100%);
      color: #f4f5ef;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    .gate {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at center, rgba(214,171,92,.06), transparent 32%),
        linear-gradient(180deg, rgba(3,16,14,.78), rgba(2,19,17,.9));
      backdrop-filter: blur(8px);
    }

    .gate.hidden {
      display: none;
    }

    .card {
      width: 100%;
      max-width: 560px;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(90deg, rgba(255,255,255,.03), rgba(255,255,255,.07), rgba(255,255,255,.02)),
        rgba(7,20,18,.88);
      box-shadow: 0 28px 90px rgba(0,0,0,.38);
    }

    .top {
      padding: 34px 34px 18px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .title {
      margin: 0;
      font-size: 64px;
      line-height: .95;
      letter-spacing: .02em;
      font-weight: 900;
      color: #f5f5ef;
    }

    .subtitle {
      margin: 10px 0 0;
      font-size: 20px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: rgba(245,245,239,.72);
    }

    .body {
      padding: 28px 34px 34px;
    }

    .status {
      min-height: 28px;
      margin: 0 0 22px;
      font-size: 16px;
      color: #f0f1ea;
    }

    .status.error {
      color: #ff8d78;
    }

    .status.success {
      color: #b8e6b1;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 16px 24px;
      font: inherit;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      min-width: 150px;
      background: #d8ae63;
      color: #111713;
    }

    .btn-secondary {
      background: rgba(255,255,255,.06);
      color: #eff1ea;
      border: 1px solid rgba(255,255,255,.08);
    }

    .btn-link {
      background: transparent;
      color: rgba(244,245,239,.78);
      padding-left: 0;
      padding-right: 0;
    }

    .netlify-identity-widget {
      z-index: 10000 !important;
    }

    @media (max-width: 640px) {
      .card {
        border-radius: 22px;
      }

      .top {
        padding: 24px 20px 14px;
      }

      .title {
        font-size: 42px;
      }

      .subtitle {
        font-size: 14px;
      }

      .body {
        padding: 20px 20px 24px;
      }

      .actions {
        flex-direction: column;
        align-items: stretch;
      }

      .btn,
      .btn-primary,
      .btn-secondary {
        width: 100%;
      }

      .btn-link {
        width: auto;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="gate" id="gate">
    <div class="card">
      <div class="top">
        <h1 class="title">SAWLPER</h1>
        <p class="subtitle">Content Studio</p>
      </div>
      <div class="body">
        <div class="status" id="status">Ready.</div>
        <div class="actions">
          <button class="btn btn-primary" id="loginBtn" type="button">Sign in</button>
          <button class="btn btn-secondary" id="refreshBtn" type="button">Refresh</button>
          <button class="btn btn-link" id="forgotBtn" type="button">Forgot password</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const gate = document.getElementById("gate");
      const statusEl = document.getElementById("status");
      const loginBtn = document.getElementById("loginBtn");
      const refreshBtn = document.getElementById("refreshBtn");
      const forgotBtn = document.getElementById("forgotBtn");
      let cmsStarted = false;
      let authPopupOpen = false;

      function setStatus(message, type) {
        statusEl.textContent = message;
        statusEl.className = "status" + (type ? " " + type : "");
      }

      function startCMS() {
        if (cmsStarted) return;
        cmsStarted = true;
        if (window.CMS && typeof window.CMS.init === "function") {
          window.CMS.init();
        }
        gate.classList.add("hidden");
      }

      function openLogin() {
        if (!window.netlifyIdentity || authPopupOpen) return;
        authPopupOpen = true;
        setStatus("Opening sign in…");
        window.netlifyIdentity.open("login");
        setTimeout(function () {
          authPopupOpen = false;
        }, 800);
      }

      function openRecover() {
        if (!window.netlifyIdentity || authPopupOpen) return;
        authPopupOpen = true;
        setStatus("Opening password recovery…");
        window.netlifyIdentity.open("recover");
        setTimeout(function () {
          authPopupOpen = false;
        }, 800);
      }

      loginBtn.addEventListener("click", openLogin);
      forgotBtn.addEventListener("click", openRecover);
      refreshBtn.addEventListener("click", function () {
        window.location.reload();
      });

      if (!window.netlifyIdentity) {
        setStatus("Netlify Identity failed to load.", "error");
        return;
      }

      window.netlifyIdentity.on("init", function (user) {
        const hash = window.location.hash || "";
        const search = window.location.search || "";

        if (user) {
          setStatus("Opening dashboard…", "success");
          startCMS();
          return;
        }

        if (hash.includes("invite_token") || search.includes("invite_token")) {
          setStatus("Complete your invited account setup.");
          if (!authPopupOpen) {
            authPopupOpen = true;
            window.netlifyIdentity.open("signup");
            setTimeout(function () {
              authPopupOpen = false;
            }, 800);
          }
          return;
        }

        if (hash.includes("recovery_token") || search.includes("recovery_token")) {
          setStatus("Reset your password.");
          if (!authPopupOpen) {
            authPopupOpen = true;
            window.netlifyIdentity.open("recover");
            setTimeout(function () {
              authPopupOpen = false;
            }, 800);
          }
          return;
        }

        setStatus("Ready.");
      });

      window.netlifyIdentity.on("login", function () {
        setStatus("Opening dashboard…", "success");
        window.location.href = "/sawlper/";
      });

      window.netlifyIdentity.on("logout", function () {
        window.location.href = "/sawlper/";
      });

      window.netlifyIdentity.on("close", function () {
        authPopupOpen = false;
      });

      window.netlifyIdentity.on("error", function (err) {
        authPopupOpen = false;
        const message = err && err.message ? err.message : "Authentication failed.";
        setStatus(message, "error");
      });

      window.netlifyIdentity.init();
    })();
  </script>
</body>
</html>
