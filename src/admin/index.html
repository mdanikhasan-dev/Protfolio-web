<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#07100d">
  <title>SAWLPER</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    :root{
      --bg:#07100d;
      --bg-2:#0b1612;
      --border:rgba(196,225,214,.16);
      --text:#f4f7f5;
      --muted:#9baea7;
      --accent:#dce9e3;
      --accent-text:#08100d;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(28,62,50,.28), transparent 38%),
        linear-gradient(180deg, var(--bg), #040806 100%);
    }
    .shell{
      width:min(92vw, 560px);
      padding:40px 28px;
      border:1px solid var(--border);
      border-radius:28px;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      box-shadow:0 24px 80px rgba(0,0,0,.35);
      text-align:center;
      backdrop-filter: blur(10px);
    }
    h1{
      margin:0;
      font-size:clamp(42px,8vw,68px);
      line-height:1;
      letter-spacing:-.04em;
      font-weight:800;
    }
    p{
      margin:14px 0 0;
      color:var(--muted);
      font-size:16px;
    }
    .actions{margin-top:32px}
    button{
      appearance:none;
      border:1px solid var(--border);
      background:transparent;
      color:var(--text);
      padding:14px 28px;
      border-radius:999px;
      font:inherit;
      font-weight:600;
      cursor:pointer;
      transition:.18s ease;
    }
    button:hover{
      transform:translateY(-1px);
      border-color:rgba(220,233,227,.5);
      background:rgba(255,255,255,.04);
    }
    .status{
      min-height:20px;
      margin-top:18px;
      font-size:14px;
      color:var(--muted);
    }
  </style>
</head>
<body>
  <main class="shell" aria-labelledby="portal-title">
    <h1 id="portal-title">SAWLPER</h1>
    <p>Enter Portal</p>
    <div class="actions">
      <button id="enterPortal" type="button">Continue</button>
    </div>
    <div class="status" id="status" aria-live="polite"></div>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const target = './decap.html';

    function setStatus(message) {
      statusEl.textContent = message || '';
    }

    function goToAdmin() {
      window.location.href = target;
    }

    function handleOpen() {
      if (!window.netlifyIdentity) {
        setStatus('Login service unavailable. Refresh and try again.');
        return;
      }
      const currentUser = window.netlifyIdentity.currentUser && window.netlifyIdentity.currentUser();
      if (currentUser) {
        goToAdmin();
        return;
      }
      setStatus('');
      window.netlifyIdentity.open();
    }

    document.getElementById('enterPortal').addEventListener('click', handleOpen);

    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', user => {
        if (user) goToAdmin();
      });
      window.netlifyIdentity.on('login', () => {
        window.netlifyIdentity.close();
        goToAdmin();
      });
      window.netlifyIdentity.on('error', err => {
        setStatus(err && err.message ? err.message : 'Login failed. Please try again.');
      });
      window.netlifyIdentity.init();
    } else {
      setStatus('Login service unavailable. Refresh and try again.');
    }
  </script>
</body>
</html>
