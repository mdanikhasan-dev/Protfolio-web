<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SAWLPER</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="/assets/icons/favicon.png" type="image/png">
  <style>
    html, body { height: 100%; }
    body {
      margin: 0;
      background: #07100d;
      color: #eaf4ee;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .boot {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }
    .boot h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: .08em;
    }
    .boot p {
      margin: 0;
      opacity: .82;
    }
  </style>
</head>
<body>
  <div class="boot">
    <div>
      <h1>SAWLPER</h1>
      <p>Loading content manager…</p>
    </div>
  </div>

<!-- Netlify Identity widget -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<!-- Decap CMS application — always load the latest version -->
<script src="https://unpkg.com/@decap-cms/app@latest/dist/decap-cms.js"></script>

<script>
  // Initialize Netlify Identity and redirect after login
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/sawlper/";
        });
      }
    });
    window.netlifyIdentity.init();
  }
</script>
</body>
</html>
