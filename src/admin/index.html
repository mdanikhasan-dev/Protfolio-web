<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAWLPER</title>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0b0f0c;
  color: #e6f1ec;
  font-family: system-ui;
}

.container {
  text-align: center;
}

h1 {
  font-size: 42px;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

p {
  color: #7a8f86;
  margin-bottom: 30px;
}

button {
  padding: 12px 28px;
  border-radius: 999px;
  border: 1px solid #1c2a25;
  background: transparent;
  color: #e6f1ec;
  cursor: pointer;
}

button:hover {
  background: #0f3d2e;
}
</style>
</head>

<body>

<div class="container">
  <h1>SAWLPER</h1>
  <p>Enter Portal</p>
  <button onclick="login()">Enter</button>
</div>

<script>
function login() {
  netlifyIdentity.open();
}

netlifyIdentity.on("login", () => {
  window.location.href = "/sawlper/decap.html";
});
</script>

</body>
</html>
