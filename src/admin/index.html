<!DOCTYPE html>
<html lang="en-BD">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>SAWLPER Admin</title>
  <link rel="stylesheet" href="./admin.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script>
    (function () {
      var authHashPattern = /(invite_token|confirmation_token|recovery_token|email_change_token)=/i;
      var defaultCmsHash = "#/collections/posts";
      var validHashPattern = /^#\/(collections\/[A-Za-z0-9_-]+(?:\/.*)?|media(?:\/.*)?|workflow(?:\/.*)?|search(?:\/.*)?)$/i;

      function normalizeCmsHash() {
        var hash = window.location.hash || "";
        if (!hash || hash === "#" || authHashPattern.test(hash)) {
          return;
        }
        if (!validHashPattern.test(hash)) {
          if (window.history && window.history.replaceState) {
            window.history.replaceState(null, "", window.location.pathname + window.location.search + defaultCmsHash);
          } else {
            window.location.hash = defaultCmsHash;
          }
        }
      }

      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", function (user) {
          if (user && (!window.location.hash || window.location.hash === "#" || authHashPattern.test(window.location.hash || ""))) {
            window.location.hash = defaultCmsHash;
          } else {
            normalizeCmsHash();
          }
        });

        window.netlifyIdentity.on("login", function () {
          if (!window.location.hash || window.location.hash === "#" || authHashPattern.test(window.location.hash || "")) {
            window.location.hash = defaultCmsHash;
          } else {
            normalizeCmsHash();
          }
        });

        window.netlifyIdentity.on("logout", function () {
          window.location.href = "./";
        });

        window.netlifyIdentity.init();
      } else {
        normalizeCmsHash();
      }

      window.addEventListener("hashchange", function () {
        if (!authHashPattern.test(window.location.hash || "")) {
          normalizeCmsHash();
        }
      });
    })();
  </script>
  <script src="https://unpkg.com/decap-cms@^3.8.3/dist/decap-cms.js"></script>
</body>
</html>
