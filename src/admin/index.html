<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>SAWLPER CMS</title>
<link rel="icon" href="/assets/icons/favicon.png" type="image/png" />
<style>
:root{
  --bg-1:#06100d;
  --bg-2:#0b1713;
  --panel:rgba(10,19,16,.82);
  --panel-2:rgba(255,255,255,.04);
  --text:#edf5f0;
  --muted:#9cafaa;
  --accent:#d2a25f;
  --accent-2:#f0d5ac;
  --border:rgba(255,255,255,.09);
  --shadow:0 24px 80px rgba(0,0,0,.34);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:var(--bg-1);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{
  background:
    radial-gradient(circle at top, rgba(210,162,95,.14), transparent 28%),
    radial-gradient(circle at bottom right, rgba(95,130,120,.12), transparent 24%),
    linear-gradient(180deg, var(--bg-1), var(--bg-2));
}
#auth-shell{
  position:fixed;
  inset:0;
  z-index:9999;
  display:grid;
  place-items:center;
  padding:24px;
  transition:opacity .28s ease, visibility .28s ease;
}
#auth-shell.is-hidden{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
}
.shell-card{
  width:min(100%, 480px);
  border:1px solid var(--border);
  background:linear-gradient(180deg, rgba(15,26,22,.95), rgba(10,19,16,.88));
  border-radius:28px;
  box-shadow:var(--shadow);
  overflow:hidden;
  backdrop-filter:blur(14px);
}
.shell-top{
  padding:34px 34px 20px;
  border-bottom:1px solid var(--border);
}
.shell-chip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  min-height:32px;
  padding:0 12px;
  border-radius:999px;
  border:1px solid rgba(210,162,95,.28);
  background:rgba(210,162,95,.08);
  color:var(--accent-2);
  font-size:12px;
  letter-spacing:.12em;
  text-transform:uppercase;
}
.shell-title{
  margin:18px 0 10px;
  font-size:34px;
  line-height:1.05;
  letter-spacing:.06em;
  font-weight:800;
}
.shell-sub{
  margin:0;
  color:var(--muted);
  line-height:1.65;
  font-size:15px;
}
.shell-body{
  padding:28px 34px 34px;
}
.status{
  display:flex;
  align-items:center;
  gap:12px;
  min-height:22px;
  color:#d7e2dc;
  font-size:14px;
  margin-bottom:24px;
}
.status-dot{
  width:10px;
  height:10px;
  border-radius:999px;
  background:linear-gradient(180deg, var(--accent), var(--accent-2));
  box-shadow:0 0 0 6px rgba(210,162,95,.12);
  flex:0 0 auto;
}
.shell-actions{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}
.btn{
  appearance:none;
  border:0;
  cursor:pointer;
  border-radius:16px;
  min-height:52px;
  padding:0 18px;
  font:inherit;
  font-weight:700;
  transition:transform .16s ease, opacity .16s ease, background .16s ease, color .16s ease;
}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-primary{
  background:linear-gradient(180deg, var(--accent), #b98946);
  color:#111914;
  min-width:176px;
}
.btn-secondary{
  background:var(--panel-2);
  color:var(--text);
  border:1px solid var(--border);
}
.shell-note{
  margin-top:18px;
  color:var(--muted);
  font-size:13px;
  line-height:1.6;
}
.loader-bar{
  width:100%;
  height:8px;
  border-radius:999px;
  background:rgba(255,255,255,.06);
  overflow:hidden;
  margin-top:16px;
}
.loader-bar span{
  display:block;
  width:34%;
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg, var(--accent), var(--accent-2));
  animation:progress 1.1s ease-in-out infinite;
}
@keyframes progress{
  0%{transform:translateX(-130%)}
  100%{transform:translateX(320%)}
}
body.cms-ready{
  background:#0a120f;
}
@media (max-width: 560px){
  .shell-top,.shell-body{padding-left:22px;padding-right:22px}
  .shell-title{font-size:28px}
  .shell-actions{flex-direction:column}
  .btn{width:100%}
}
</style>
</head>
<body>
<div id="auth-shell">
  <div class="shell-card">
    <div class="shell-top">
      <div class="shell-chip">Private Admin</div>
      <h1 class="shell-title">SAWLPER CMS</h1>
      <p class="shell-sub">A private dashboard for your portfolio content. Access is restricted to invited accounts only.</p>
    </div>
    <div class="shell-body">
      <div class="status"><span class="status-dot"></span><span id="status-text">Checking secure session…</span></div>
      <div id="progress-wrap" class="loader-bar" aria-hidden="true"><span></span></div>
      <div class="shell-actions" id="action-row" hidden>
        <button class="btn btn-primary" id="login-button" type="button">Sign in</button>
        <button class="btn btn-secondary" id="refresh-button" type="button">Refresh</button>
      </div>
      <div class="shell-note" id="note-text">Use the invitation email from Netlify Identity to create access. After that, use only Sign in here.</div>
    </div>
  </div>
</div>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
(function(){
  const shell = document.getElementById("auth-shell");
  const statusText = document.getElementById("status-text");
  const progressWrap = document.getElementById("progress-wrap");
  const actionRow = document.getElementById("action-row");
  const noteText = document.getElementById("note-text");
  const loginButton = document.getElementById("login-button");
  const refreshButton = document.getElementById("refresh-button");
  const inviteFlow = /(?:invite_token|confirmation_token|recovery_token|email_change_token)=/i.test(window.location.hash);
  let cmsRequested = false;

  const setStatus = (text) => {
    statusText.textContent = text;
  };

  const showActions = () => {
    progressWrap.hidden = true;
    actionRow.hidden = false;
  };

  const showLoader = () => {
    progressWrap.hidden = false;
    actionRow.hidden = true;
  };

  const hideShell = () => {
    document.body.classList.add("cms-ready");
    shell.classList.add("is-hidden");
  };

  const sanitizeIdentityWidget = () => {
    const nodes = Array.from(document.querySelectorAll("button, a, div, span"));
    for (const node of nodes) {
      const text = (node.textContent || "").trim().replace(/\s+/g, " ").toLowerCase();
      if (text === "sign up") {
        const parentText = ((node.parentElement && node.parentElement.textContent) || "").trim().replace(/\s+/g, " ").toLowerCase();
        if (parentText.includes("sign up") && parentText.includes("log in") && parentText.length < 80) {
          node.style.display = "none";
        }
      }
    }
  };

  const mountCms = () => {
    if (cmsRequested) return;
    cmsRequested = true;
    setStatus(inviteFlow ? "Opening invitation flow…" : "Loading dashboard…");
    showLoader();
    const script = document.createElement("script");
    script.src = "https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js";
    script.onload = () => {
      const reveal = () => {
        sanitizeIdentityWidget();
        hideShell();
      };
      const observer = new MutationObserver(() => {
        sanitizeIdentityWidget();
        const loaded = document.querySelector('a[href*="#/collections/"], a[href*="#/workflow"], [data-slate-editor="true"], main');
        if (loaded) {
          observer.disconnect();
          setTimeout(reveal, 250);
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });
      setTimeout(reveal, 1500);
    };
    script.onerror = () => {
      cmsRequested = false;
      setStatus("The dashboard failed to load. Refresh and try again.");
      noteText.textContent = "If the problem keeps happening, redeploy the site on Netlify and check that Git Gateway is enabled.";
      showActions();
    };
    document.body.appendChild(script);
  };

  const init = () => {
    if (!window.netlifyIdentity) {
      setStatus("Netlify Identity is unavailable.");
      noteText.textContent = "The Identity script did not load. Refresh this page and try again.";
      showActions();
      return;
    }

    window.netlifyIdentity.on("init", (user) => {
      sanitizeIdentityWidget();
      if (user || inviteFlow) {
        mountCms();
        return;
      }
      setStatus("No active session found.");
      noteText.textContent = "This dashboard is private. Sign in with an invited account only.";
      showActions();
    });

    window.netlifyIdentity.on("login", () => {
      window.netlifyIdentity.close();
      setStatus("Signed in. Loading dashboard…");
      mountCms();
    });

    window.netlifyIdentity.on("logout", () => {
      window.location.href = "/sawlper/";
    });

    window.netlifyIdentity.on("open", sanitizeIdentityWidget);
    window.netlifyIdentity.on("close", sanitizeIdentityWidget);
    window.netlifyIdentity.on("error", () => {
      setStatus("Authentication could not be completed.");
      noteText.textContent = "Check your invitation, password, and site identity settings, then try again.";
      showActions();
    });

    loginButton.addEventListener("click", () => {
      sanitizeIdentityWidget();
      window.netlifyIdentity.open("login");
      setTimeout(sanitizeIdentityWidget, 50);
      setTimeout(sanitizeIdentityWidget, 300);
      setTimeout(sanitizeIdentityWidget, 800);
    });

    refreshButton.addEventListener("click", () => {
      window.location.reload();
    });

    const watcher = new MutationObserver(sanitizeIdentityWidget);
    watcher.observe(document.body, { childList: true, subtree: true });

    window.netlifyIdentity.init();
  };

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init, { once: true });
  } else {
    init();
  }
})();
</script>
</body>
</html>
