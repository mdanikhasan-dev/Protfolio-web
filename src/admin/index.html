<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>SAWLPER CMS</title>
  <link rel="icon" href="/assets/icons/favicon.png" type="image/png" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #04110f;
      --bg-soft: rgba(10, 24, 21, 0.88);
      --line: rgba(212, 168, 94, 0.24);
      --line-soft: rgba(255, 255, 255, 0.08);
      --text: #eef4f1;
      --muted: #9eb0a9;
      --accent: #d4a85e;
      --accent-strong: #e0b56c;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(212, 168, 94, 0.1), transparent 30%),
        radial-gradient(circle at bottom left, rgba(38, 98, 83, 0.18), transparent 28%),
        linear-gradient(180deg, #04110f 0%, #071715 100%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    body.cms-active {
      background: #0a1311;
    }

    #gate {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      z-index: 9999;
      transition: opacity 0.28s ease, visibility 0.28s ease;
    }

    #gate.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .gate-shell {
      width: min(92vw, 470px);
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02)),
        rgba(7, 19, 17, 0.82);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      overflow: hidden;
      position: relative;
      isolation: isolate;
    }

    .gate-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 18%, rgba(212, 168, 94, 0.14), transparent 28%),
        radial-gradient(circle at 85% 82%, rgba(84, 138, 122, 0.12), transparent 34%);
      pointer-events: none;
      z-index: -1;
    }

    .gate-head {
      padding: 28px 30px 20px;
      border-bottom: 1px solid var(--line-soft);
    }

    .brand {
      margin: 0;
      font-size: clamp(32px, 5vw, 42px);
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .subline {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .gate-body {
      padding: 26px 30px 30px;
      display: grid;
      gap: 18px;
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 14px;
    }

    .status strong {
      color: var(--text);
      font-weight: 600;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 15px;
      padding: 14px 22px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease, background 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-primary {
      min-width: 148px;
      background: linear-gradient(180deg, var(--accent-strong), var(--accent));
      color: #1b1307;
      box-shadow: 0 10px 24px rgba(212, 168, 94, 0.2);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .btn-link {
      background: transparent;
      color: var(--muted);
      padding-left: 2px;
      padding-right: 2px;
    }

    .loader {
      display: none;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .loader.is-visible {
      display: inline-flex;
    }

    .loader-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(212, 168, 94, 0.48);
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(212, 168, 94, 0.48); }
      70% { box-shadow: 0 0 0 12px rgba(212, 168, 94, 0); }
      100% { box-shadow: 0 0 0 0 rgba(212, 168, 94, 0); }
    }

    .netlify-identity-widget,
    .netlify-identity-widget * {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    }

    .netlify-identity-widget .modal {
      backdrop-filter: blur(6px);
    }

    .netlify-identity-widget .content {
      border-radius: 22px !important;
      overflow: hidden !important;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.44) !important;
      border: 1px solid rgba(255, 255, 255, 0.07) !important;
    }

    .netlify-identity-widget .btn {
      border-radius: 14px !important;
      font-weight: 700 !important;
    }

    .netlify-identity-widget input,
    .netlify-identity-widget textarea,
    .netlify-identity-widget select {
      border-radius: 14px !important;
    }

    @media (max-width: 560px) {
      .gate-head {
        padding: 24px 22px 18px;
      }

      .gate-body {
        padding: 22px;
      }

      .actions {
        display: grid;
      }

      .btn-primary,
      .btn-secondary {
        width: 100%;
      }
    }
  </style>
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</head>
<body>
  <div id="gate">
    <section class="gate-shell" aria-label="Admin sign in">
      <div class="gate-head">
        <h1 class="brand">SAWLPER</h1>
        <p class="subline">Content Studio</p>
      </div>
      <div class="gate-body">
        <div class="status" id="status"><strong>Ready.</strong> Sign in to open the editor.</div>
        <div class="actions">
          <button class="btn-primary" id="signInButton" type="button">Sign in</button>
          <button class="btn-secondary" id="refreshButton" type="button">Refresh</button>
          <button class="btn-link" id="forgotButton" type="button">Forgot password</button>
        </div>
        <div class="loader" id="loader"><span class="loader-dot"></span><span>Opening editor</span></div>
      </div>
    </section>
  </div>

  <script>
    (function () {
      var gate = document.getElementById("gate");
      var status = document.getElementById("status");
      var loader = document.getElementById("loader");
      var signInButton = document.getElementById("signInButton");
      var refreshButton = document.getElementById("refreshButton");
      var forgotButton = document.getElementById("forgotButton");
      var cmsStarted = false;
      var authTokenPattern = /invite_token|confirmation_token|recovery_token|email_change_token/i;
      var authTokenPresent = authTokenPattern.test(window.location.hash + window.location.search);

      function setStatus(html) {
        status.innerHTML = html;
      }

      function setLoading(isLoading) {
        loader.classList.toggle("is-visible", !!isLoading);
        signInButton.disabled = !!isLoading;
        refreshButton.disabled = !!isLoading;
        forgotButton.disabled = !!isLoading;
      }

      function hideGate() {
        document.body.classList.add("cms-active");
        gate.classList.add("is-hidden");
      }

      function tuneIdentityWidget() {
        var textNodes = Array.prototype.slice.call(document.querySelectorAll("button, a, div, span"));
        var loginTab = textNodes.find(function (node) {
          return node.textContent && node.textContent.trim().toLowerCase() === "log in";
        });
        var signUpTab = textNodes.find(function (node) {
          return node.textContent && node.textContent.trim().toLowerCase() === "sign up";
        });
        var needAccount = textNodes.find(function (node) {
          return node.textContent && /need an account\?/i.test(node.textContent.trim());
        });
        if (signUpTab) {
          if (signUpTab.parentElement) signUpTab.parentElement.style.display = "none";
          signUpTab.style.display = "none";
        }
        if (needAccount) {
          if (needAccount.parentElement) needAccount.parentElement.style.display = "none";
          needAccount.style.display = "none";
        }
        if (loginTab && typeof loginTab.click === "function") {
          loginTab.click();
        }
      }

      function startCMS() {
        if (cmsStarted || !window.CMS) return;
        cmsStarted = true;
        setLoading(true);
        setStatus("<strong>Signed in.</strong> Opening editor.");
        hideGate();
        window.CMS.init();
        window.setTimeout(function () {
          setLoading(false);
        }, 1200);
      }

      function openLogin() {
        if (!window.netlifyIdentity) return;
        setStatus("<strong>Sign in required.</strong>");
        window.netlifyIdentity.open("login");
        window.setTimeout(tuneIdentityWidget, 80);
        window.setTimeout(tuneIdentityWidget, 240);
        window.setTimeout(tuneIdentityWidget, 640);
      }

      function openRecovery() {
        if (!window.netlifyIdentity) return;
        window.netlifyIdentity.open("forgot");
      }

      signInButton.addEventListener("click", openLogin);
      refreshButton.addEventListener("click", function () {
        window.location.reload();
      });
      forgotButton.addEventListener("click", openRecovery);

      var observer = new MutationObserver(function () {
        tuneIdentityWidget();
      });
      observer.observe(document.documentElement, { childList: true, subtree: true });

      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", function (user) {
          if (user) {
            startCMS();
            return;
          }
          if (authTokenPresent) {
            setStatus("<strong>Verification in progress.</strong>");
            window.netlifyIdentity.open();
            window.setTimeout(tuneIdentityWidget, 120);
            return;
          }
          setStatus("<strong>Ready.</strong> Sign in to open the editor.");
        });

        window.netlifyIdentity.on("login", function () {
          window.location.href = "/sawlper/";
        });

        window.netlifyIdentity.on("logout", function () {
          window.location.href = "/sawlper/";
        });

        window.netlifyIdentity.on("error", function () {
          setLoading(false);
          setStatus("<strong>Could not sign in.</strong> Refresh and try again.");
        });

        window.netlifyIdentity.init();
      } else {
        setStatus("<strong>Identity unavailable.</strong> Refresh and try again.");
      }
    })();
  </script>
</body>
</html>
