<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
{{SEO_HEAD}}
  <style>
    @keyframes floatChar {
      0%,100% { transform:translateY(0px) rotate(-0.8deg); }
      50%      { transform:translateY(-20px) rotate(0.8deg); }
    }
    @keyframes armSwayL {
      0%,100% { transform:rotate(-14deg); }
      50%      { transform:rotate(-30deg); }
    }
    @keyframes armSwayR {
      0%,100% { transform:rotate(14deg); }
      50%      { transform:rotate(30deg); }
    }
    @keyframes pulseAnt {
      0%,100% { opacity:1; r:5; }
      50%      { opacity:0.22; r:3.2; }
    }
    @keyframes pulseGlow {
      0%,100% { text-shadow:0 0 40px rgba(58,125,92,0.3),0 0 80px rgba(58,125,92,0.1); }
      50%      { text-shadow:0 0 80px rgba(58,125,92,0.68),0 0 140px rgba(58,125,92,0.26); }
    }
    @keyframes twinkle {
      0%,100% { opacity:0.08; transform:scale(1); }
      50%      { opacity:0.95; transform:scale(1.7); }
    }
    @keyframes drift {
      0%,100% { transform:translate(0,0) rotate(0deg); opacity:0.45; }
      50%      { transform:translate(13px,-17px) rotate(11deg); opacity:0.85; }
    }
    @keyframes orbit {
      from { transform:rotate(0deg) translateX(108px) rotate(0deg); }
      to   { transform:rotate(360deg) translateX(108px) rotate(-360deg); }
    }
    @keyframes orbitRev {
      from { transform:rotate(0deg) translateX(80px) rotate(0deg); }
      to   { transform:rotate(-360deg) translateX(80px) rotate(360deg); }
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(22px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .p404-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: clamp(2rem,6vw,4rem) clamp(1rem,4vw,2rem);
      position: relative;
      overflow: hidden;
    }

    .p404-star {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(237,243,239,0.78);
      pointer-events: none;
    }
    .p404-star:nth-child(1)  { top:6%;  left:9%;  animation:twinkle 2.1s ease-in-out infinite; }
    .p404-star:nth-child(2)  { top:13%; left:74%; animation:twinkle 3.3s ease-in-out infinite 0.6s; }
    .p404-star:nth-child(3)  { top:27%; left:42%; animation:twinkle 2.7s ease-in-out infinite 1.2s; }
    .p404-star:nth-child(4)  { top:4%;  left:56%; animation:twinkle 1.9s ease-in-out infinite 0.3s; }
    .p404-star:nth-child(5)  { top:43%; left:91%; animation:twinkle 3.1s ease-in-out infinite 0.9s; }
    .p404-star:nth-child(6)  { top:63%; left:5%;  animation:twinkle 2.5s ease-in-out infinite 1.5s; }
    .p404-star:nth-child(7)  { top:73%; left:85%; animation:twinkle 2.2s ease-in-out infinite 0.4s; }
    .p404-star:nth-child(8)  { top:83%; left:21%; animation:twinkle 3.8s ease-in-out infinite 0.8s; }
    .p404-star:nth-child(9)  { top:11%; left:93%; animation:twinkle 2.9s ease-in-out infinite 1.1s; }
    .p404-star:nth-child(10) { top:89%; left:63%; animation:twinkle 2.3s ease-in-out infinite 0.2s; width:4px; height:4px; }
    .p404-star:nth-child(11) { top:51%; left:51%; animation:twinkle 1.7s ease-in-out infinite 0.7s; }
    .p404-star:nth-child(12) { top:35%; left:17%; animation:twinkle 4.1s ease-in-out infinite 1.8s; }

    .p404-drift {
      position: absolute;
      font-size: clamp(1.3rem,2.5vw,1.7rem);
      font-weight: 800;
      color: rgba(58,125,92,0.4);
      pointer-events: none;
      user-select: none;
    }
    .p404-drift:nth-child(1) { top:18%; left:7%;  animation:drift 6s  ease-in-out infinite; }
    .p404-drift:nth-child(2) { top:57%; left:4%;  animation:drift 8s  ease-in-out infinite 1s; }
    .p404-drift:nth-child(3) { top:19%; right:6%; animation:drift 7s  ease-in-out infinite 0.5s; }
    .p404-drift:nth-child(4) { top:67%; right:5%; animation:drift 9s  ease-in-out infinite 2s; }

    .p404-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(1rem,2.5vw,1.5rem);
    }

    .p404-number {
      margin: 0;
      font-size: clamp(5.5rem,18vw,10rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text);
      animation: pulseGlow 3s ease-in-out infinite, slideUp 0.6s ease both;
    }

    .p404-scene {
      position: relative;
      width: 260px;
      height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: slideUp 0.6s ease 0.1s both;
    }

    .p404-orbit {
      position: absolute;
      top: 50%;
      left: 50%;
      margin-top: -11px;
      margin-left: -11px;
      font-size: 1.2rem;
      font-weight: 800;
      color: rgba(58,125,92,0.72);
      pointer-events: none;
    }
    .p404-orbit:nth-child(1) { animation:orbit    7s  linear infinite; }
    .p404-orbit:nth-child(2) { animation:orbit    7s  linear infinite 2.3s; }
    .p404-orbit:nth-child(3) { animation:orbitRev 11s linear infinite 0.8s; }

    .p404-char {
      animation: floatChar 4s ease-in-out infinite;
      overflow: visible;
    }

    .p404-arm-l {
      transform-origin: 38px 118px;
      animation: armSwayL 4s ease-in-out infinite;
    }
    .p404-arm-r {
      transform-origin: 122px 118px;
      animation: armSwayR 4s ease-in-out infinite;
    }

    .p404-heading {
      margin: 0;
      font-size: clamp(1.3rem,3.5vw,1.9rem);
      font-weight: 700;
      color: var(--text);
      animation: slideUp 0.65s ease 0.15s both;
    }

    .p404-text {
      margin: 0;
      color: var(--text-soft);
      font-size: clamp(0.9rem,2vw,1.05rem);
      animation: slideUp 0.65s ease 0.26s both;
    }

    .p404-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.9rem 2.4rem;
      background: #3a7d5c;
      color: #f4f7f5;
      font-weight: 700;
      font-size: 1rem;
      border-radius: var(--radius-pill);
      text-decoration: none;
      animation: slideUp 0.65s ease 0.38s both;
      box-shadow: 0 4px 28px rgba(58,125,92,0.32);
      transition: background 180ms ease, transform 180ms ease, box-shadow 180ms ease;
    }
    .p404-btn:hover,
    .p404-btn:focus-visible {
      background: #2f6a4d;
      transform: translateY(-3px);
      box-shadow: 0 8px 36px rgba(58,125,92,0.46);
    }
    .p404-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .p404-eye-l,
    .p404-eye-r {
      transition: transform 55ms ease;
    }

    @media (max-width:500px) {
      .p404-drift { display:none; }
      .p404-scene { width:200px; height:200px; }
    }
  </style>
</head>

  <script>
    (function () {
      var svg   = document.getElementById('p404svg');
      var pL    = document.getElementById('p404pL');
      var pR    = document.getElementById('p404pR');
      var g1L   = document.getElementById('p404g1L');
      var g1R   = document.getElementById('p404g1R');
      var g2L   = document.getElementById('p404g2L');
      var g2R   = document.getElementById('p404g2R');
      var eyeL  = document.getElementById('p404eyeL');
      var eyeR  = document.getElementById('p404eyeR');

      if (!svg || !pL || !pR) return;

      var EL = { x: 67, y: 68 };
      var ER = { x: 93, y: 68 };
      var MAX = 3.8;

      var tlx = EL.x, tly = EL.y;
      var trx = ER.x, try_ = ER.y;
      var lx = EL.x,  ly = EL.y;
      var rx = ER.x,  ry = ER.y;
      var blinkTimer;

      function onMove(cx, cy) {
        var r   = svg.getBoundingClientRect();
        var ox  = r.left + r.width  * (80 / 160);
        var oy  = r.top  + r.height * (68 / 220);
        var dx  = cx - ox;
        var dy  = cy - oy;
        var d   = Math.sqrt(dx * dx + dy * dy);
        var ang = Math.atan2(dy, dx);
        var pd  = MAX * Math.min(d / 280, 1);
        tlx  = EL.x + Math.cos(ang) * pd;
        tly  = EL.y + Math.sin(ang) * pd;
        trx  = ER.x + Math.cos(ang) * pd;
        try_ = ER.y + Math.sin(ang) * pd;
      }

      function lerp(a, b, t) { return a + (b - a) * t; }

      function setAttr(el, attr, val) {
        if (el) el.setAttribute(attr, val.toFixed(2));
      }

      function tick() {
        lx = lerp(lx, tlx,  0.1);
        ly = lerp(ly, tly,  0.1);
        rx = lerp(rx, trx,  0.1);
        ry = lerp(ry, try_, 0.1);

        setAttr(pL,  'cx', lx);   setAttr(pL,  'cy', ly);
        setAttr(pR,  'cx', rx);   setAttr(pR,  'cy', ry);
        setAttr(g1L, 'cx', lx + 2.2); setAttr(g1L, 'cy', ly - 1.8);
        setAttr(g1R, 'cx', rx + 2.2); setAttr(g1R, 'cy', ry - 1.8);
        setAttr(g2L, 'cx', lx - 1.4); setAttr(g2L, 'cy', ly + 2.9);
        setAttr(g2R, 'cx', rx - 1.4); setAttr(g2R, 'cy', ry + 2.9);

        requestAnimationFrame(tick);
      }

      function doBlink() {
        var close = function (el) {
          if (!el) return;
          el.style.transform      = 'scaleY(0.06)';
          el.style.transformBox   = 'fill-box';
          el.style.transformOrigin = '50% 50%';
        };
        var open = function (el) {
          if (!el) return;
          el.style.transform = '';
        };
        close(eyeL);
        close(eyeR);
        setTimeout(function () { open(eyeL); open(eyeR); }, 110);
        blinkTimer = setTimeout(doBlink, 2000 + Math.random() * 2800);
      }

      window.addEventListener('mousemove', function (e) {
        onMove(e.clientX, e.clientY);
      }, { passive: true });

      window.addEventListener('touchmove', function (e) {
        if (e.touches[0]) onMove(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: true });

      requestAnimationFrame(tick);
      blinkTimer = setTimeout(doBlink, 1800);
    })();
  </script>
