<!DOCTYPE html>
<html lang="en-BD">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact MD Anik Hasan</title>
{{SEO_HEAD}}
</head>
<body class="page page-contact" data-page="contact">
  <a class="skip-link" href="#main-content">Skip to content</a>

  <div class="site-bg site-bg-inner" aria-hidden="true">
    <div class="bg-photo"></div>
    <div class="bg-shade"></div>
    <div class="bg-mist"></div>
  </div>

  <div class="site-shell">
{{NAV_HEADER}}

    <main id="main-content" class="site-main shell shell-wide">
      <section class="section section-line">
        <div class="contact-layout">
          <section class="contact-main flow-sm" aria-label="Email contact" itemscope itemtype="https://schema.org/ContactPoint">
            <h1 class="contact-label">Email</h1>
            <h2 class="contact-title">Say hello.</h2>
            <p>{{CONTACT_INTRO}}</p>
            <div class="contact-copy">
              <div class="contact-email-row">
                <p class="contact-email" itemprop="email">{{CONTACT_EMAIL}}</p>
                <button class="button-copy" type="button" data-copy-email="{{CONTACT_EMAIL}}" aria-label="Copy email address to clipboard" aria-describedby="copy-status">Copy</button>
              </div>
              <p class="copy-feedback" id="copy-status" aria-live="polite" aria-atomic="true"></p>
              <p class="contact-response">{{CONTACT_RESPONSE_TIME}}</p>
            </div>
          </section>
